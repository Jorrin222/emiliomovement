<html lang="nl">

<head>

    <title>Bedankt voor je aanvraag | Emilio Movement</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .bedankt-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: var(--color-bg, #0a0a0a);
        }

        .bedankt-card {
            max-width: 560px;
        }

        .bedankt-icon {
            width: 64px;
            height: 64px;
            border: 2px solid var(--color-accent, #c8ff00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }

        .bedankt-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--color-accent, #c8ff00);
        }

        .bedankt-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--color-text, #f0ede8);
            margin-bottom: 1rem;
        }

        .bedankt-sub {
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            color: var(--color-text-muted, #a0a0a0);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .bedankt-back {
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-accent, #c8ff00);
            text-decoration: none;
            border: 1.5px solid var(--color-accent, #c8ff00);
            padding: 0.75rem 2rem;
            transition: background 0.2s, color 0.2s;
        }

        .bedankt-back:hover {
            background: var(--color-accent, #c8ff00);
            color: #0a0a0a;
        }
    </style>
</head>

<body class="bedankt-page">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P28BB9PL"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="bedankt-card">
        <div class="bedankt-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1 class="bedankt-title">Bedankt voor je aanvraag</h1>
        <p class="bedankt-sub">
            We hebben je bericht ontvangen en nemen zo snel mogelijk contact met je op voor een vrijblijvend kennismakingsgesprek.
        </p>
        <a href="https://info.emiliomovement.nl" class="bedankt-back">Terug naar de website</a>
    </div>
</body>

</html>
